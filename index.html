            { grade: 'A', min: 511, max: 680, label: 'Sangat Baik', color: 'bg-emerald-500', text: 'text-emerald-700' },

        let isAdminAuthenticated = false;
        let totalCriteria = APP_DATA.sections.reduce((acc, s) => acc + s.items.length, 0);
        let allHistoryData = [];
        let pinAction = null;

        window.toggleView = (view, bypassAuth = false) => {
            if (view === 'history' && !isAdminAuthenticated && !bypassAuth) {
                pinAction = () => window.toggleView('history', true);
                document.getElementById('pin-modal').classList.remove('hidden');
                return;
            }
            document.getElementById('form-view').classList.toggle('hidden', view !== 'form');
            document.getElementById('history-view').classList.toggle('hidden', view !== 'history');
            updateUIState();
        };

        const updateUIState = () => {
            const navForm = document.getElementById('nav-form');
            const navHist = document.getElementById('nav-history');
            const isForm = !document.getElementById('form-view').classList.contains('hidden');
            
            navForm.className = `flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${isForm ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`;
            navHist.className = `flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${!isForm ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`;
            
            const editBtn = document.getElementById('admin-edit-btn');
            if(selectedEmployee) {
                editBtn.classList.remove('hidden');
            } else {
                editBtn.classList.add('hidden');
            }

            const lockIcon = document.getElementById('lock-icon');
            if (isAdminAuthenticated) {
                lockIcon.innerHTML = '<i data-lucide="unlock" class="w-3 h-3 text-emerald-500"></i>';
            } else {
                lockIcon.innerHTML = '<i data-lucide="lock" class="w-3 h-3"></i>';
            }
            lucide.createIcons();
        };

        window.handleAdminLogout = () => {
            isAdminAuthenticated = false;
            showToast("Admin Logout Berhasil", "success");
            window.toggleView('form'); 
            updateUIState(); 
        };

        window.handleEmployeeSelect = (e) => {
            selectedEmployee = EMPLOYEE_DB.find(emp => emp.id == e.target.value) || null;
            refreshProfileCard();
            updateUIState();
            
            const canFill = selectedEmployee && selectedEmployee.isActive;
            const inactiveWarning = document.getElementById('inactive-warning');
            
            if (selectedEmployee && !selectedEmployee.isActive) {
                inactiveWarning.classList.remove('hidden');
            } else {
                inactiveWarning.classList.add('hidden');
            }

            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.disabled = !canFill;
                btn.style.opacity = canFill ? '1' : '0.3';
            });
            updateSummary();
        };

        const refreshProfileCard = () => {
            const profileCard = document.getElementById('employee-profile-card');
            const placeholder = document.getElementById('prof-placeholder');
            const imgContainer = document.getElementById('prof-img-container');
            const statusBadge = document.getElementById('status-badge');
            const empPositionHeader = document.getElementById('emp-position');

            if (selectedEmployee) {
                document.getElementById('prof-name').innerText = selectedEmployee.name;
                document.getElementById('prof-pos').innerText = selectedEmployee.position;
                empPositionHeader.innerText = selectedEmployee.position;

                if(selectedEmployee.isActive) {
                    statusBadge.className = "inline-flex items-center gap-1.5 px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-100";
                    statusBadge.innerHTML = '<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Aktif';
                } else {
                    statusBadge.className = "inline-flex items-center gap-1.5 px-4 py-1.5 bg-rose-50 text-rose-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-rose-100";
                    statusBadge.innerHTML = '<span class="w-1.5 h-1.5 bg-rose-500 rounded-full"></span> Tidak Aktif';
                }

                if (selectedEmployee.photo) {
                    imgContainer.innerHTML = `<img src="${selectedEmployee.photo}" class="w-full h-full object-cover rounded-3xl" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(selectedEmployee.name)}&background=random'">`;
                    placeholder.classList.add('hidden');
                } else {
                    imgContainer.innerHTML = '';
                    placeholder.classList.remove('hidden');
                }
                profileCard.classList.remove('hidden');
            } else {
                profileCard.classList.add('hidden');
                empPositionHeader.innerText = '-';
            }
        };

        window.openEditModal = () => {
            if (!isAdminAuthenticated) {
                pinAction = () => window.openEditModal();
                document.getElementById('pin-modal').classList.remove('hidden');
                return;
            }
            if(!selectedEmployee) return;
            document.getElementById('edit-emp-name').value = selectedEmployee.name;
            document.getElementById('edit-emp-pos').value = selectedEmployee.position;
            document.getElementById('edit-emp-photo').value = selectedEmployee.photo || '';
            document.getElementById('edit-emp-status').value = selectedEmployee.isActive ? "true" : "false";
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.saveEmployeeData = async () => {
            const newName = document.getElementById('edit-emp-name').value;
            const newPos = document.getElementById('edit-emp-pos').value;
            const newPhoto = document.getElementById('edit-emp-photo').value;
            const newStatus = document.getElementById('edit-emp-status').value === "true";

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'employees', selectedEmployee.id), {
                    id: selectedEmployee.id,
                    name: newName,
                    position: newPos,
                    photo: newPhoto,
                    isActive: newStatus
                });

                document.getElementById('edit-modal').classList.add('hidden');
                showToast("Data Karyawan Tersimpan");
            } catch (err) {
                console.error(err);
                showToast("Gagal menyimpan perubahan", "error");
            }
        };

        window.verifyPin = () => {
            const input = document.getElementById('pin-input');
            if (input.value === ADMIN_PIN) {
                isAdminAuthenticated = true;
                document.getElementById('pin-modal').classList.add('hidden');
                updateUIState();
                showToast("Akses Admin Terverifikasi");
                if (pinAction) { pinAction(); pinAction = null; }
            } else {
                showToast("PIN Salah!", "error");
            }
            input.value = '';
        };

        window.setScore = (sectionId, idx, value) => {
            currentScores[`${sectionId}-${idx}`] = value;
            document.querySelectorAll(`[id^="btn-${sectionId}-${idx}-"]`).forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-110');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`btn-${sectionId}-${idx}-${value}`);
            activeBtn.classList.replace('text-slate-400', 'text-indigo-600');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'scale-110');
            updateSummary();
        };

        window.handleSave = async () => {
            const filledCount = Object.keys(currentScores).length;
            if (!selectedEmployee || !selectedEmployee.isActive) {
                showToast("Karyawan Tidak Aktif", "error");
                return;
            }
            if (filledCount < totalCriteria) {
                document.getElementById('alert-modal').classList.remove('hidden');
                return;
            }
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Menyimpan...";
            try {
                const score = calculateScore();
                const gradeInfo = getGradeInfo(score);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'assessments'), {
                    employeeName: selectedEmployee.name,
                    position: selectedEmployee.position,
                    period: getPreviousMonthString(),
                    score: score,
                    grade: gradeInfo.grade,
                    quality: gradeInfo.label,
                    createdAt: Date.now()
                });
                showToast("Berhasil Disimpan!", "success");
                window.resetForm();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) { 
                showToast("Tidak Berhasil Disimpan", "error"); 
            } finally { 
                saveBtn.disabled = false; 
                saveBtn.innerHTML = 'Simpan'; 
                updateSummary(); 
            }
        };

        window.resetForm = () => {
            currentScores = {};
            selectedEmployee = null;
            document.getElementById('emp-select').value = '';
            document.getElementById('emp-position').innerText = '-';
            document.getElementById('employee-profile-card').classList.add('hidden');
            document.getElementById('inactive-warning').classList.add('hidden');
            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-110');
                btn.classList.add('text-slate-400');
                btn.disabled = true;
            });
            updateSummary();
            updateUIState();
        };

        window.handleDelete = async (id) => {
            if (!isAdminAuthenticated) return;
            if(confirm("Hapus data ini?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assessments', id));
                    showToast("Data Terhapus");
                } catch (err) { console.error(err); }
            }
        };

        const getPreviousMonthString = () => {
            const date = new Date();
            date.setMonth(date.getMonth() - 1);
            return date.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        };
        const calculateScore = () => {
            const rawSum = Object.values(currentScores).reduce((a, b) => a + b, 0);
            return Math.round((rawSum / (totalCriteria * 4)) * 680);
        };
        const getGradeInfo = (score) => GRADING.find(g => score >= g.min && score <= g.max) || GRADING[3];
        
        const updateSummary = () => {
            const score = calculateScore();
            const gradeInfo = getGradeInfo(score);
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-grade').innerText = `${gradeInfo.grade} - ${gradeInfo.label}`;
            document.getElementById('final-grade').className = `text-xl font-bold ${gradeInfo.text}`;
            const filledCount = Object.keys(currentScores).length;
            document.getElementById('progress-bar').style.width = `${(filledCount / totalCriteria) * 100}%`;
            document.getElementById('progress-text').innerText = `${filledCount} / ${totalCriteria} Kriteria`;
            const saveBtn = document.getElementById('save-btn');
            const canSave = selectedEmployee && selectedEmployee.isActive && filledCount >= totalCriteria;
            if(!canSave) saveBtn.classList.add('opacity-50');
            else saveBtn.classList.remove('opacity-50');
        };

        const showToast = (msg, type = "success") => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-xl shadow-xl text-white font-bold z-[100] ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        // PERBAIKAN: Fungsi Dropdown Dinamis
        const updateEmployeeDropdown = () => {
            const empSelect = document.getElementById('emp-select');
            const currentValue = empSelect.value;
            empSelect.innerHTML = '<option value="">-- Pilih --</option>';
            
            const namesInHistory = allHistoryData.map(h => h.employeeName);
            // Filter karyawan yang belum dinilai
            const availableEmployees = EMPLOYEE_DB.filter(emp => !namesInHistory.includes(emp.name));

            // Langkah 1: Kumpulkan semua jabatan unik yang ada di database
            const uniquePositions = [...new Set(availableEmployees.map(emp => emp.position || "Lainnya"))].sort();

            // Langkah 2: Render dropdown per Jabatan/Posisi secara otomatis
            uniquePositions.forEach(pos => {
                const groupEmployees = availableEmployees.filter(emp => emp.position === pos);
                if (groupEmployees.length > 0) {
                    const optGroup = document.createElement('optgroup');
                    // Format label prodi/jabatan agar lebih cantik
                    optGroup.label = `-- ${pos} --`;
                    
                    groupEmployees.forEach(emp => {
                        const opt = document.createElement('option');
                        opt.value = emp.id;
                        opt.innerText = emp.name + (!emp.isActive ? " (Tidak Aktif)" : "");
                        optGroup.appendChild(opt);
                    });
                    empSelect.appendChild(optGroup);
                }
            });

            if (currentValue && Array.from(empSelect.options).some(o => o.value === currentValue)) {
                empSelect.value = currentValue;
            }
        };

        const renderForm = () => {
            const container = document.getElementById('evaluation-sections');
            container.innerHTML = APP_DATA.sections.map(section => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center gap-3">
                        <div class="p-2 bg-white rounded-lg border border-slate-200 text-indigo-600"><i data-lucide="${section.icon}" class="w-5 h-5"></i></div>
                        <h2 class="font-bold text-lg text-slate-800">${section.title}</h2>
                    </div>
                    <div class="divide-y divide-slate-100">
                        ${section.items.map((item, idx) => `
                            <div class="p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-slate-50/50">
                                <p class="text-slate-700 font-medium flex-1">${item}</p>
                                <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-fit">
                                    ${['D', 'C', 'B', 'A'].map((label, v) => `
                                        <button onclick="window.setScore('${section.id}', ${idx}, ${v + 1})" id="btn-${section.id}-${idx}-${v + 1}" class="score-btn w-10 h-10 rounded-lg flex items-center justify-center font-bold text-sm transition-all text-slate-400" disabled>${label}</button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const initEmployees = async () => {
            const empCol = collection(db, 'artifacts', appId, 'public', 'data', 'employees');
            const snapshot = await getDocs(empCol);
            
            if (snapshot.empty) {
                const batch = writeBatch(db);
                INITIAL_EMPLOYEES.forEach(emp => {
                    const d = doc(db, 'artifacts', appId, 'public', 'data', 'employees', emp.id);
                    batch.set(d, emp);
                });
                await batch.commit();
            }

            onSnapshot(empCol, (snap) => {
                EMPLOYEE_DB = snap.docs.map(d => d.data());
                updateEmployeeDropdown();
                if (selectedEmployee) {
                    selectedEmployee = EMPLOYEE_DB.find(e => e.id === selectedEmployee.id);
                    refreshProfileCard();
                }
            });
        };

        const init = async () => {
            if (!auth) return;
            await signInAnonymously(auth);
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    await initEmployees();
                    const q = collection(db, 'artifacts', appId, 'public', 'data', 'assessments');
                    onSnapshot(q, (snapshot) => {
                        allHistoryData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        updateEmployeeDropdown();
                        
                        const monthFilter = document.getElementById('filter-month').value;
                        const yearFilter = document.getElementById('filter-year').value;
                        const filtered = allHistoryData.filter(item => {
                            const [month, year] = item.period.split(' ');
                            return (monthFilter === "" || month.toLowerCase() === monthFilter.toLowerCase()) && (yearFilter === "" || year === yearFilter);
                        }).sort((a, b) => b.createdAt - a.createdAt);
                        
                        const tbody = document.getElementById('history-body');
                        tbody.innerHTML = filtered.length ? filtered.map(item => `
                            <tr class="hover:bg-slate-50 border-b border-slate-100">
                                <td class="px-6 py-4"><p class="font-bold text-slate-800">${item.employeeName}</p><p class="text-xs text-slate-400">${item.position}</p></td>
                                <td class="px-6 py-4 text-slate-600">${item.period}</td>
                                <td class="px-6 py-4"><span class="px-2 py-1 rounded text-white font-bold text-xs ${getGradeInfo(item.score).color}">${item.grade}</span> <span class="font-bold ml-2">${item.score}</span></td>
                                <td class="px-6 py-4 text-center"><button onclick="window.handleDelete('${item.id}')" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>
                            </tr>
                        `).join('') : '<tr><td colspan="4" class="px-6 py-20 text-center text-slate-400 italic">Data tidak ditemukan.</td></tr>';
                        lucide.createIcons();
                    });
                }
            });
        };

        window.onload = () => {
            document.getElementById('period-display').innerText = getPreviousMonthString();
            renderForm();
            init();
        };
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">
    <div id="toast" class="hidden"></div>
    <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl hidden sm:block tracking-tight text-slate-800">SDM APU</h1>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="nav-form" onclick="toggleView('form')" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white text-indigo-600 shadow-sm">Form</button>
                <button id="nav-history" onclick="toggleView('history')" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500">Riwayat <span id="lock-icon"></span></button>
            </div>
        </div>

        <div id="form-view">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Karyawan</label><select id="emp-select" onchange="handleEmployeeSelect(event)" class="w-full border-b border-slate-200 py-1 bg-transparent outline-none font-bold text-slate-700"><option value="">-- Pilih --</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Jabatan</label><div id="emp-position" class="py-1 border-b border-slate-100 text-slate-500 font-medium h-8">-</div></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Periode</label><div id="period-display" class="py-1 border-b border-slate-100 text-indigo-600 font-bold h-8">-</div></div>
            </div>

            <div id="inactive-warning" class="hidden bg-rose-50 border border-rose-200 rounded-2xl p-4 mb-6 flex items-center gap-3 text-rose-600">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                <p class="text-sm font-bold tracking-tight">Karyawan ini berstatus tidak aktif.</p>
            </div>

            <div id="employee-profile-card" class="hidden bg-white rounded-3xl p-8 shadow-sm border border-slate-200 mb-6 relative overflow-hidden tracking-tight">
                <div class="flex flex-col sm:flex-row items-center gap-8 relative z-10">
                    <div class="w-24 h-24 sm:w-28 sm:h-28 bg-slate-100 rounded-3xl flex items-center justify-center text-slate-400 border-4 border-white shadow-xl overflow-hidden relative flex-shrink-0" id="prof-img-container"></div>
                    <div id="prof-placeholder" class="hidden absolute left-4 top-4 sm:left-10 sm:top-10"><i data-lucide="user" class="w-12 h-12 text-slate-300"></i></div>
                    <div class="text-center sm:text-left">
                        <h2 class="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight mb-2" id="prof-name">-</h2>
                        <div class="flex flex-wrap justify-center sm:justify-start gap-3">
                            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 bg-slate-100 text-slate-600 rounded-full text-sm font-bold"><i data-lucide="briefcase" class="w-4 h-4"></i> <span id="prof-pos">-</span></span>
                            <span id="status-badge"></span>
                        </div>
                    </div>
                    <button id="admin-edit-btn" onclick="openEditModal()" class="hidden sm:flex ml-auto p-4 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><i data-lucide="edit-3" class="w-6 h-6"></i></button>
                </div>
            </div>

            <div id="evaluation-sections"></div>
            
            <div class="sticky bottom-8 bg-white/90 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-6 z-40">
                <div class="flex gap-8 items-center">
                    <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Skor</p><p id="final-score" class="text-4xl font-black">0</p></div>
                    <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Grade</p><p id="final-grade" class="text-xl font-bold text-slate-300">D - Buruk</p></div>
                    <div class="hidden md:block w-40"><div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>Progress</span><span id="progress-text">0 / 31</span></div><div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-indigo-600 transition-all" style="width: 0%"></div></div></div>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button onclick="resetForm()" class="flex-1 md:flex-none px-6 py-3 rounded-xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50">Batal</button>
                    <button id="save-btn" onclick="handleSave()" class="flex-1 md:flex-none px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg">Simpan</button>
                </div>
            </div>
        </div>

        <div id="history-view" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[400px]">
                <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
                    <h2 class="text-xl font-bold flex items-center gap-2">Riwayat</h2>
                    <div class="flex flex-wrap items-center gap-2">
                        <select id="filter-month" onchange="updateEmployeeDropdown()" class="bg-white border rounded-lg px-3 py-1.5 text-sm outline-none"><option value="">Semua Bulan</option><option value="Januari">Januari</option><option value="Februari">Februari</option><option value="Maret">Maret</option><option value="April">April</option><option value="Mei">Mei</option><option value="Juni">Juni</option><option value="Juli">Juli</option><option value="Agustus">Agustus</option><option value="September">September</option><option value="Oktober">Oktober</option><option value="November">November</option><option value="Desember">Desember</option></select>
                        <select id="filter-year" onchange="updateEmployeeDropdown()" class="bg-white border rounded-lg px-3 py-1.5 text-sm outline-none"><option value="">Semua Tahun</option><option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option></select>
                        <button onclick="handleAdminLogout()" class="text-xs font-bold text-rose-500 hover:underline">Logout Admin</button>
                    </div>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold"><tr><th class="px-6 py-4">Karyawan</th><th class="px-6 py-4">Periode</th><th class="px-6 py-4">Hasil</th><th class="px-6 py-4 text-center">Aksi</th></tr></thead><tbody id="history-body"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-sm w-full shadow-2xl text-center space-y-4">
            <h3 class="text-xl font-bold">Akses Admin</h3>
            <input type="password" id="pin-input" class="w-full border-2 rounded-2xl px-4 py-4 text-center text-2xl tracking-[1em] outline-none" placeholder="••••" maxlength="4">
            <div class="flex gap-3"><button onclick="document.getElementById('pin-modal').classList.add('hidden')" class="flex-1 py-4 font-bold text-slate-400">Batal</button><button onclick="verifyPin()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Masuk</button></div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl space-y-4">
            <h3 class="text-xl font-bold">Edit Profile Karyawan</h3>
            <div class="space-y-4 text-left">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Nama Lengkap</label><input type="text" id="edit-emp-name" class="w-full border rounded-xl px-4 py-3 outline-none focus:border-indigo-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Jabatan</label><input type="text" id="edit-emp-pos" class="w-full border rounded-xl px-4 py-3 outline-none focus:border-indigo-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Status Keaktifan</label><select id="edit-emp-status" class="w-full border rounded-xl px-4 py-3 outline-none"><option value="true">Aktif</option><option value="false">Tidak Aktif</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">URL Foto (Opsional)</label><input type="text" id="edit-emp-photo" class="w-full border rounded-xl px-4 py-3 outline-none focus:border-indigo-500"></div>
            </div>
            <div class="flex gap-3 pt-4"><button onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 py-3 font-bold text-slate-400">Batal</button><button onclick="saveEmployeeData()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">Simpan</button></div>
        </div>
    </div>

    <div id="alert-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[200] p-4 hidden">

            <p class="text-slate-500">Lengkapi seluruh 31 kriteria penilaian.</p>
            <button onclick="document.getElementById('alert-modal').classList.add('hidden')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">Siap!</button>
        </div>
    </div>
</body>
