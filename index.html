<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Penilaian Kinerja Karyawan - Prodi APU</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const myLocalFirebaseConfig = {
            apiKey: "AIzaSyDYhgALzdt8VBpv1L08J8pSX-_Av1N9Lt0",
            authDomain: "penilaian-kinerja-karyaw-1a172.firebaseapp.com",
            projectId: "penilaian-kinerja-karyaw-1a172",
            storageBucket: "penilaian-kinerja-karyaw-1a172.firebasestorage.app",
            messagingSenderId: "757443538968",
            appId: "1:757443538968:web:9bd8adcd40671018c5136d",
            measurementId: "G-4CNCMSCHX6"
        };

        const firebaseConfig = (typeof window.__firebase_config !== 'undefined' && window.__firebase_config !== "") 
            ? JSON.parse(window.__firebase_config) 
            : myLocalFirebaseConfig;

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error", e);
        }

        const appId = window.__app_id || 'performance-appraisal-001';
        const ADMIN_PIN = "1234";

        const EMPLOYEE_DB = [
            { id: 1, name: "Muhamad Agung S, S.Sos., M.Sos", position: "Kaprodi Ilmu Komunikasi" },
            { id: 2, name: "Prof Daffa", position: "Orang Pusat" },
            { id: 3, name: "Rudi Hermawan S.Kom", position: "Orang Penting" },
            { id: 4, name: "Lala Po", position: "Orang Sibuk" },
            { id: 5, name: "Wahyu", position: "Wong Koplo" }
        ];

        const APP_DATA = {
            sections: [
                { id: 'disiplin', title: 'I. Disiplin', icon: 'zap', items: ['Menyelesaikaan pekerjaan sesuai target', 'Presensi / kehadiran', 'Waktu Kerja (bekerja dengan optimal)', 'Kepatuhan terhadap perintah atasan', 'Produktivitas kerja'] },
                { id: 'tanggung_jawab', title: 'II. Tanggung Jawab', icon: 'shield-check', items: ['Kualitas pekerjaan', 'Kuantitas pekerjaan', 'Menjaga kerapihan, ketertiban dan keamanan di lingkungan kerja', 'Bekerja secara efektifitas dan efisiensi', 'Menghasilkan Formula/Produk/SOP/Dokumen', 'Mencapai target/standar perusahaan', 'Pelayanan/service excellent', 'Tanggung Jawab dalam kegiatan Kepanitiaan'] },
                { id: 'kepribadian', title: 'III. Kepribadian', icon: 'user', items: ['Kejujuran', 'Motivasi/Inisiatif Kerja', 'Kerja sama/koordinasi tim', 'Attitude yang baik', 'Kecepatan dalam merespon', 'Handling Complain', 'Kerapihan pakaian kerja'] },
                { id: 'kepemimpinan', title: 'IV. Kepemimpinan', icon: 'users', items: ['Koordinasi Karyawan', 'Kontrol Karyawan', 'Evaluasi dan pembinaan karyawan', 'Delegasi, tanggung jawab dan wewenang', 'Kecepatan dan ketepatan pengambilan keputusan'] },
                { id: 'kompetensi', title: 'V. Kompetensi', icon: 'award', items: ['Pengetahuan (Knowledge)', 'Pemahaman (Understanding)', 'Kemampuan (Skill)', 'Memecahkan masalah (Problem Solving)', 'Pengambilan Keputusan (Decision Making)', 'Komunikasi efektif (Effective communication)'] }
            ]
        };

        const GRADING = [
            { grade: 'A', min: 511, max: 680, label: 'Sangat Baik', color: 'bg-emerald-500', text: 'text-emerald-700' },
            { grade: 'B', min: 341, max: 510, label: 'Baik', color: 'bg-blue-500', text: 'text-blue-700' },
            { grade: 'C', min: 171, max: 340, label: 'Cukup', color: 'bg-amber-500', text: 'text-amber-700' },
            { grade: 'D', min: 0, max: 170, label: 'Buruk', color: 'bg-rose-500', text: 'text-rose-700' }
        ];

        let currentScores = {};
        let selectedEmployee = null;
        let isAdminAuthenticated = false;
        let totalCriteria = APP_DATA.sections.reduce((acc, s) => acc + s.items.length, 0);
        let allHistoryData = [];

        window.toggleView = (view) => {
            if (view === 'history' && !isAdminAuthenticated) {
                document.getElementById('pin-modal').classList.remove('hidden');
                return;
            }
            document.getElementById('form-view').classList.toggle('hidden', view !== 'form');
            document.getElementById('history-view').classList.toggle('hidden', view !== 'history');
            document.getElementById('nav-form').className = `flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'form' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`;
            document.getElementById('nav-history').className = `flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${view === 'history' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`;
        };

        window.setScore = (sectionId, idx, value) => {
            currentScores[`${sectionId}-${idx}`] = value;
            document.querySelectorAll(`[id^="btn-${sectionId}-${idx}-"]`).forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-110');
                btn.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById(`btn-${sectionId}-${idx}-${value}`);
            activeBtn.classList.replace('text-slate-400', 'text-indigo-600');
            activeBtn.classList.add('bg-white', 'shadow-sm', 'scale-110');
            updateSummary();
        };

        window.handleEmployeeSelect = (e) => {
            selectedEmployee = EMPLOYEE_DB.find(emp => emp.id == e.target.value) || null;
            document.getElementById('emp-position').innerText = selectedEmployee ? selectedEmployee.position : '-';
            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.disabled = !selectedEmployee;
                btn.style.opacity = selectedEmployee ? '1' : '0.3';
            });
            updateSummary();
        };

        window.verifyPin = () => {
            const input = document.getElementById('pin-input');
            if (input.value === ADMIN_PIN) {
                isAdminAuthenticated = true;
                document.getElementById('pin-modal').classList.add('hidden');
                document.getElementById('lock-icon').innerHTML = '<i data-lucide="unlock" class="w-3 h-3 text-emerald-500"></i>';
                lucide.createIcons();
                window.toggleView('history');
            } else {
                showToast("PIN Salah!", "error");
            }
            input.value = '';
        };

        window.handleSave = async () => {
            const filledCount = Object.keys(currentScores).length;
            if (!selectedEmployee || filledCount < totalCriteria) {
                document.getElementById('alert-modal').classList.remove('hidden');
                return;
            }

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Menyimpan...";
            try {
                const score = calculateScore();
                const gradeInfo = getGradeInfo(score);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'assessments'), {
                    employeeName: selectedEmployee.name,
                    position: selectedEmployee.position,
                    period: getPreviousMonthString(),
                    score: score,
                    grade: gradeInfo.grade,
                    quality: gradeInfo.label,
                    createdAt: Date.now()
                });
                showToast("Data Tersimpan!");
                window.resetForm();
                window.toggleView('history');
            } catch (err) {
                showToast("Error: " + err.message, "error");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Simpan';
                updateSummary();
            }
        };

        window.resetForm = () => {
            currentScores = {};
            selectedEmployee = null;
            document.getElementById('emp-select').value = '';
            document.getElementById('emp-position').innerText = '-';
            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-indigo-600', 'shadow-sm', 'scale-110');
                btn.classList.add('text-slate-400');
                btn.disabled = true;
            });
            updateSummary();
        };

        window.handleDelete = async (id) => {
            if(confirm("Hapus data ini?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'assessments', id));
                    showToast("Data Terhapus");
                } catch (err) { console.error(err); }
            }
        };

        const getPreviousMonthString = () => {
            const date = new Date();
            date.setMonth(date.getMonth() - 1);
            return date.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        };

        const calculateScore = () => {
            const rawSum = Object.values(currentScores).reduce((a, b) => a + b, 0);
            return Math.round((rawSum / (totalCriteria * 4)) * 680);
        };

        const getGradeInfo = (score) => GRADING.find(g => score >= g.min && score <= g.max) || GRADING[3];

        const updateSummary = () => {
            const score = calculateScore();
            const gradeInfo = getGradeInfo(score);
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-grade').innerText = `${gradeInfo.grade} - ${gradeInfo.label}`;
            document.getElementById('final-grade').className = `text-xl font-bold ${gradeInfo.text}`;
            const filledCount = Object.keys(currentScores).length;
            document.getElementById('progress-bar').style.width = `${(filledCount / totalCriteria) * 100}%`;
            document.getElementById('progress-text').innerText = `${filledCount} / ${totalCriteria} Kriteria`;
            
            document.getElementById('save-btn').disabled = false;
            if(!selectedEmployee || filledCount < totalCriteria) {
                document.getElementById('save-btn').classList.add('opacity-50');
            } else {
                document.getElementById('save-btn').classList.remove('opacity-50');
            }
        };

        const showToast = (msg, type = "success") => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-4 right-4 px-6 py-3 rounded-xl shadow-xl text-white font-bold z-[100] ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const renderForm = () => {
            const container = document.getElementById('evaluation-sections');
            container.innerHTML = APP_DATA.sections.map(section => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center gap-3">
                        <div class="p-2 bg-white rounded-lg border border-slate-200 text-indigo-600"><i data-lucide="${section.icon}" class="w-5 h-5"></i></div>
                        <h2 class="font-bold text-lg text-slate-800">${section.title}</h2>
                    </div>
                    <div class="divide-y divide-slate-100">
                        ${section.items.map((item, idx) => `
                            <div class="p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-slate-50/50">
                                <p class="text-slate-700 font-medium flex-1">${item}</p>
                                <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl w-fit">
                                    ${['D', 'C', 'B', 'A'].map((label, v) => `
                                        <button onclick="window.setScore('${section.id}', ${idx}, ${v + 1})" id="btn-${section.id}-${idx}-${v + 1}" class="score-btn w-10 h-10 rounded-lg flex items-center justify-center font-bold text-sm transition-all text-slate-400" disabled>${label}</button>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // --- Filter Logic ---
        window.applyHistoryFilter = () => {
            const monthFilter = document.getElementById('filter-month').value;
            const yearFilter = document.getElementById('filter-year').value;
            
            const filtered = allHistoryData.filter(item => {
                const [month, year] = item.period.split(' ');
                const matchMonth = monthFilter === "" || month.toLowerCase() === monthFilter.toLowerCase();
                const matchYear = yearFilter === "" || year === yearFilter;
                return matchMonth && matchYear;
            });
            
            renderHistoryTable(filtered);
        };

        const renderHistoryTable = (data) => {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = data.length ? data.map(item => `
                <tr class="hover:bg-slate-50 border-b border-slate-100">
                    <td class="px-6 py-4"><p class="font-bold text-slate-800">${item.employeeName}</p><p class="text-xs text-slate-400">${item.position}</p></td>
                    <td class="px-6 py-4 text-slate-600">${item.period}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded text-white font-bold text-xs ${getGradeInfo(item.score).color}">${item.grade}</span> <span class="font-bold ml-2">${item.score}</span></td>
                    <td class="px-6 py-4 text-center"><button onclick="window.handleDelete('${item.id}')" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button></td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="px-6 py-20 text-center text-slate-400 italic">Data tidak ditemukan.</td></tr>';
            lucide.createIcons();
        };

        const init = async () => {
            if (!auth) return;
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const q = collection(db, 'artifacts', appId, 'public', 'data', 'assessments');
                        onSnapshot(q, (snapshot) => {
                            allHistoryData = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.createdAt - a.createdAt);
                            applyHistoryFilter(); // Tampilkan dengan filter yang sedang aktif
                        });
                    }
                });
            } catch (err) { console.error("Auth Error:", err); }
        };

        window.onload = () => {
            document.getElementById('period-display').innerText = getPreviousMonthString();
            const empSelect = document.getElementById('emp-select');
            EMPLOYEE_DB.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp.id; opt.innerText = emp.name;
                empSelect.appendChild(opt);
            });
            renderForm();
            init();
        };
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen">
    <div id="toast" class="hidden"></div>
    <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Navigation -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl hidden sm:block tracking-tight text-slate-800">SDM APU</h1>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button id="nav-form" onclick="toggleView('form')" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all bg-white text-indigo-600 shadow-sm">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Form
                </button>
                <button id="nav-history" onclick="toggleView('history')" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-500">
                    <i data-lucide="history" class="w-4 h-4"></i> Riwayat <span id="lock-icon"><i data-lucide="lock" class="w-3 h-3"></i></span>
                </button>
            </div>
        </div>

        <!-- FORM VIEW -->
        <div id="form-view">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Karyawan</label><select id="emp-select" onchange="handleEmployeeSelect(event)" class="w-full border-b border-slate-200 py-1 bg-transparent outline-none font-bold text-slate-700"><option value="">-- Pilih --</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Jabatan</label><div id="emp-position" class="py-1 border-b border-slate-100 text-slate-500 font-medium h-8">-</div></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Periode</label><div id="period-display" class="py-1 border-b border-slate-100 text-indigo-600 font-bold h-8">-</div></div>
            </div>
            <div id="evaluation-sections"></div>
            <div class="sticky bottom-8 bg-white/90 backdrop-blur-md rounded-2xl p-6 shadow-2xl border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-6 z-40">
                <div class="flex gap-8 items-center">
                    <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Skor</p><p id="final-score" class="text-4xl font-black">0</p></div>
                    <div class="text-center"><p class="text-[10px] font-bold text-slate-400 uppercase">Grade</p><p id="final-grade" class="text-xl font-bold text-slate-300">D - Buruk</p></div>
                    <div class="hidden md:block w-40"><div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>Progress</span><span id="progress-text">0 / 31</span></div><div class="h-1.5 bg-slate-100 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-indigo-600 transition-all" style="width: 0%"></div></div></div>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button onclick="resetForm()" class="flex-1 md:flex-none px-6 py-3 rounded-xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50">Batal</button>
                    <button id="save-btn" onclick="handleSave()" class="flex-1 md:flex-none px-8 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:bg-indigo-700 shadow-lg transition-opacity duration-300">Simpan</button>
                </div>
            </div>
        </div>

        <!-- HISTORY VIEW -->
        <div id="history-view" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[400px]">
                <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
                    <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="history" class="text-indigo-600"></i> Riwayat</h2>
                    
                    <!-- Filters -->
                    <div class="flex flex-wrap items-center gap-2">
                        <select id="filter-month" onchange="applyHistoryFilter()" class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium outline-none focus:border-indigo-500">
                            <option value="">Semua Bulan</option>
                            <option value="Januari">Januari</option>
                            <option value="Februari">Februari</option>
                            <option value="Maret">Maret</option>
                            <option value="April">April</option>
                            <option value="Mei">Mei</option>
                            <option value="Juni">Juni</option>
                            <option value="Juli">Juli</option>
                            <option value="Agustus">Agustus</option>
                            <option value="September">September</option>
                            <option value="Oktober">Oktober</option>
                            <option value="November">November</option>
                            <option value="Desember">Desember</option>
                        </select>
                        <select id="filter-year" onchange="applyHistoryFilter()" class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium outline-none focus:border-indigo-500">
                            <option value="">Semua Tahun</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                        </select>
                        <button onclick="isAdminAuthenticated = false; toggleView('form');" class="text-xs font-bold text-rose-500 hover:underline sm:ml-2">Logout Admin</button>
                    </div>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead class="bg-slate-50 text-slate-400 uppercase text-[10px] font-bold tracking-wider"><tr><th class="px-6 py-4">Karyawan</th><th class="px-6 py-4">Periode</th><th class="px-6 py-4">Hasil</th><th class="px-6 py-4 text-center">Aksi</th></tr></thead><tbody id="history-body"></tbody></table></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="pin-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center space-y-4">
            <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto text-indigo-600"><i data-lucide="lock" class="w-8 h-8"></i></div>
            <h3 class="text-xl font-bold text-slate-800">Akses Admin</h3>
            <input type="password" id="pin-input" class="w-full border-2 border-slate-100 rounded-2xl px-4 py-4 text-center text-2xl tracking-[1em] focus:border-indigo-500 outline-none" placeholder="••••" maxlength="4">
            <div class="flex gap-3"><button onclick="document.getElementById('pin-modal').classList.add('hidden')" class="flex-1 py-4 font-bold text-slate-400">Batal</button><button onclick="verifyPin()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">Masuk</button></div>
        </div>
    </div>

    <!-- Modal Peringatan (Belum Lengkap) -->
    <div id="alert-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center space-y-4">
            <div class="bg-amber-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto text-amber-600"><i data-lucide="alert-triangle" class="w-8 h-8"></i></div>
            <h3 class="text-xl font-bold text-slate-800">Data Belum Lengkap!</h3>
            <p class="text-slate-500">Mohon pilih karyawan dan isi seluruh kriteria penilaian (31 kriteria) sebelum menyimpan.</p>
            <button onclick="document.getElementById('alert-modal').classList.add('hidden')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">Tutup</button>
        </div>
    </div>
</body>
</html>
